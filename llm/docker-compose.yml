services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    # If your VM has a GPU, you'd add the deploy/resources block here

  context_gateway:
    build: ./context_gateway
    environment:
      - CONTEXT_DIR=/context
      - LLM_URL=http://ollama:11434/api/generate
      - MODEL=${ACTIVE_MODEL}
    volumes:
      - ./context:/context
    ports:
      - "3001:8000"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - DEFAULT_MODELS=${ACTIVE_MODEL}
    volumes:
      - ./data/open-webui:/app/backend/data
    depends_on:
      - ollama